name: Release macOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-26
    environment: release
    timeout-minutes: 90

    env:
      APP_NAME: geeksfield
      SCHEME: Geeksfield
      PROJECT: Geeksfield.xcodeproj
      ARCHIVE_PATH: build/Geeksfield.xcarchive
      EXPORT_PATH: build/export

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          eval "$(ruby <<'RUBY'
          require "yaml"

          settings = YAML.load_file("project.yml").dig("settings", "base")
          base_version = settings.fetch("MARKETING_VERSION")
          major, minor, patch = base_version.split(".").map(&:to_i)

          remote_tags = `git ls-remote --tags origin "refs/tags/v[0-9]*.[0-9]*.[0-9]*"`
            .lines
            .map { |line| line.match(/refs\/tags\/v(\d+)\.(\d+)\.(\d+)$/)&.captures&.map(&:to_i) }
            .compact
            .select { |tag_major, tag_minor, _| tag_major == major && tag_minor == minor }

          if remote_tags.empty?
            version = base_version
          else
            latest_patch = remote_tags.map { |_, _, tag_patch| tag_patch }.max
            version = [major, minor, latest_patch + 1].join(".")
          end

          build = ENV.fetch("GITHUB_RUN_NUMBER")

          puts "VERSION=#{version}"
          puts "BUILD=#{build}"
          puts "TAG=v#{version}"
          RUBY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Apply release version
        run: |
          ruby <<'RUBY'
          path = "project.yml"
          version = ENV.fetch("RELEASE_VERSION")
          build = ENV.fetch("RELEASE_BUILD")
          text = File.read(path)
          text = text.sub(/MARKETING_VERSION:\s*"[^"]+"/, %(MARKETING_VERSION: "#{version}"))
          text = text.sub(/CURRENT_PROJECT_VERSION:\s*"[^"]+"/, %(CURRENT_PROJECT_VERSION: "#{build}"))
          File.write(path, text)
          RUBY
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_BUILD: ${{ steps.version.outputs.build }}

      - name: Skip existing release tag
        id: existing_tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release tag ${{ steps.version.outputs.tag }} already exists. Nothing to publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate signing secrets
        if: steps.existing_tag.outputs.exists == 'false'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          test -n "$APPLE_CERTIFICATE_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_TEAM_ID"
          test -n "$APP_STORE_CONNECT_KEY_ID"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_BASE64"
          test -n "$SPARKLE_PRIVATE_KEY"

      - name: Generate Xcode project
        if: steps.existing_tag.outputs.exists == 'false'
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Import Developer ID certificate
        if: steps.existing_tag.outputs.exists == 'false'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$RUNNER_TEMP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$RUNNER_TEMP" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security list-keychains -d user | sed s/\\\"//g)"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$RUNNER_TEMP" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | tee "$RUNNER_TEMP/codesigning-identities.txt"
          grep -q "Developer ID Application" "$RUNNER_TEMP/codesigning-identities.txt"

      - name: Archive
        if: steps.existing_tag.outputs.exists == 'false'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export Developer ID app
        if: steps.existing_tag.outputs.exists == 'false'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Package for notarization
        if: steps.existing_tag.outputs.exists == 'false'
        run: |
          mkdir -p build
          ditto -c -k --keepParent "$EXPORT_PATH/$APP_NAME.app" "build/${APP_NAME}-${{ steps.version.outputs.tag }}-unsigned-ticket.zip"

      - name: Notarize
        if: steps.existing_tag.outputs.exists == 'false'
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          xcrun notarytool submit "build/${APP_NAME}-${{ steps.version.outputs.tag }}-unsigned-ticket.zip" \
            --key "$API_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait

      - name: Staple and package Sparkle update archive
        if: steps.existing_tag.outputs.exists == 'false'
        run: |
          xcrun stapler staple "$EXPORT_PATH/$APP_NAME.app"
          xcrun stapler validate "$EXPORT_PATH/$APP_NAME.app"
          ditto -c -k --keepParent "$EXPORT_PATH/$APP_NAME.app" "build/${APP_NAME}-${{ steps.version.outputs.tag }}.zip"

      - name: Create DMG installer
        if: steps.existing_tag.outputs.exists == 'false'
        id: dmg
        run: |
          brew install create-dmg
          CREATE_DMG_WORKDIR="$RUNNER_TEMP/create-dmg"
          rm -rf "$CREATE_DMG_WORKDIR"
          mkdir -p "$CREATE_DMG_WORKDIR/support"
          cp "$(command -v create-dmg)" "$CREATE_DMG_WORKDIR/create-dmg"
          cp -R "$(brew --prefix create-dmg)/share/create-dmg/support/." "$CREATE_DMG_WORKDIR/support/"
          touch "$CREATE_DMG_WORKDIR/.this-is-the-create-dmg-repo"
          chmod +x "$CREATE_DMG_WORKDIR/create-dmg"
          CREATE_DMG_TEMPLATE="$CREATE_DMG_WORKDIR/support/template.applescript"
          perl -0pi -e 's/set statusbar visible to false/set toolbar visible to false\n\t\t\t\tset statusbar visible to false\n\t\t\t\tset pathbar visible to false/g' "$CREATE_DMG_TEMPLATE"
          DMG_NAME="${APP_NAME}-${{ steps.version.outputs.tag }}.dmg"
          DMG_ROOT="$RUNNER_TEMP/dmg-root"
          BG_WIDTH="$(sips -g pixelWidth packaging/dmgbg.png | awk '/pixelWidth/ {print $2}')"
          BG_HEIGHT="$(sips -g pixelHeight packaging/dmgbg.png | awk '/pixelHeight/ {print $2}')"
          ICON_SIZE="$((BG_WIDTH / 8))"
          ICON_Y="$((BG_HEIGHT / 2))"
          APP_ICON_X="$((BG_WIDTH / 4))"
          APPLICATIONS_ICON_X="$((BG_WIDTH * 3 / 4))"
          rm -rf "$DMG_ROOT"
          mkdir -p "$DMG_ROOT"
          cp -R "$EXPORT_PATH/$APP_NAME.app" "$DMG_ROOT/"
          osascript <<APPLESCRIPT
          tell application "Finder"
            make new alias file to POSIX file "/Applications" at POSIX file "$DMG_ROOT" with properties {name:"Applications"}
          end tell
          APPLESCRIPT
          APPLICATIONS_ICON="/System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/ApplicationsFolderIcon.icns"
          APPLICATIONS_ICON_RSRC="$RUNNER_TEMP/applications-icon.r"
          {
            printf "data 'icns' (-16455) {\n"
            xxd -p -c 256 "$APPLICATIONS_ICON" | sed 's/^/  $"/; s/$/"/'
            printf "};\n"
          } > "$APPLICATIONS_ICON_RSRC"
          Rez -append "$APPLICATIONS_ICON_RSRC" -o "$DMG_ROOT/Applications"
          SetFile -a C "$DMG_ROOT/Applications"
          "$CREATE_DMG_WORKDIR/create-dmg" \
            --volname "$APP_NAME" \
            --background "packaging/dmgbg.png" \
            --window-size "$BG_WIDTH" "$BG_HEIGHT" \
            --icon-size "$ICON_SIZE" \
            --icon "$APP_NAME.app" "$APP_ICON_X" "$ICON_Y" \
            --icon "Applications" "$APPLICATIONS_ICON_X" "$ICON_Y" \
            --hide-extension "$APP_NAME.app" \
            "build/${DMG_NAME}" \
            "$DMG_ROOT"
          echo "asset_name=${DMG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Notarize DMG installer
        if: steps.existing_tag.outputs.exists == 'false'
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          xcrun notarytool submit "build/${{ steps.dmg.outputs.asset_name }}" \
            --key "$API_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait
          xcrun stapler staple "build/${{ steps.dmg.outputs.asset_name }}"
          xcrun stapler validate "build/${{ steps.dmg.outputs.asset_name }}"

      - name: Download Sparkle tools
        if: steps.existing_tag.outputs.exists == 'false'
        run: |
          mkdir -p build/sparkle
          curl -L \
            -o build/sparkle/Sparkle-2.9.1.tar.xz \
            https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-2.9.1.tar.xz
          tar -xf build/sparkle/Sparkle-2.9.1.tar.xz -C build/sparkle

      - name: Sign Sparkle update archive
        if: steps.existing_tag.outputs.exists == 'false'
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          ASSET_NAME="${APP_NAME}-${{ steps.version.outputs.tag }}.zip"
          ASSET_PATH="build/${ASSET_NAME}"
          SIGN_OUTPUT="$(echo "$SPARKLE_PRIVATE_KEY" | build/sparkle/bin/sign_update --ed-key-file - "$ASSET_PATH")"
          ED_SIGNATURE="$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')"
          LENGTH="$(echo "$SIGN_OUTPUT" | sed -n 's/.* length="\([0-9]*\)".*/\1/p')"
          test -n "$ED_SIGNATURE"
          test -n "$LENGTH"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"
          echo "asset_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.version.outputs.tag }}/${ASSET_NAME}" >> "$GITHUB_OUTPUT"
          echo "ed_signature=${ED_SIGNATURE}" >> "$GITHUB_OUTPUT"
          echo "length=${LENGTH}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.existing_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RELEASE_NOTES_MODEL: gpt-5-mini
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          DMG_ASSET_NAME: ${{ steps.dmg.outputs.asset_name }}
          SPARKLE_ASSET_NAME: ${{ steps.sparkle.outputs.asset_name }}
        run: |
          ruby <<'RUBY'
          require "json"
          require "net/http"
          require "open3"
          require "uri"

          def gh_json(*args)
            command = ["gh", *args]
            output, status = Open3.capture2e({"GH_TOKEN" => ENV.fetch("GH_TOKEN")}, *command)
            raise "#{command.join(" ")} failed:\n#{output}" unless status.success?
            JSON.parse(output)
          end

          def release_pr_number
            pulls = gh_json(
              "api",
              "repos/#{ENV.fetch("GITHUB_REPOSITORY")}/commits/#{ENV.fetch("GITHUB_SHA")}/pulls",
              "-H", "Accept: application/vnd.github+json"
            )
            return pulls.first["number"] if pulls.first

            subject = `git log -1 --pretty=%s`.strip
            subject[/#(\d+)/, 1]
          end

          def release_changes(pr_number)
            if pr_number
              commits = gh_json(
                "api",
                "repos/#{ENV.fetch("GITHUB_REPOSITORY")}/pulls/#{pr_number}/commits?per_page=100"
              )
              files = gh_json(
                "api",
                "repos/#{ENV.fetch("GITHUB_REPOSITORY")}/pulls/#{pr_number}/files?per_page=100"
              )
            else
              commits = [{
                "commit" => {
                  "message" => `git log -1 --pretty=%B`
                }
              }]
              files = []
            end

            subjects = commits
              .map { |entry| entry.dig("commit", "message").to_s.lines.first.to_s.strip }
              .reject(&:empty?)
              .reject { |subject| subject.match?(/\A(Release \d|Merge dev into main|Merge branch )/i) }
              .uniq

            paths = files.map { |entry| entry["filename"].to_s }.reject(&:empty?).uniq
            [subjects, paths]
          end

          def fallback_notes(subjects, paths)
            notes = []
            lowered = subjects.join("\n").downcase

            if lowered.include?("sparkle") || paths.any? { |path| path.include?("Sparkle") || path == "project.yml" || path.include?("updater") }
              notes << "Sparkle 자동 업데이트 설정과 배포 흐름을 개선했습니다."
            end

            if lowered.include?("paste") || paths.any? { |path| path.include?("MultilineTextEditor") || path.include?("Features/Prompt") || path.include?("Features/Chat") }
              notes << "이미지 붙여넣기와 입력창 첨부 동작을 더 안정적으로 다듬었습니다."
            end

            if paths.any? { |path| path.start_with?(".github/workflows/") }
              notes << "GitHub Actions 릴리스 자동화를 개선했습니다."
            end

            if paths.any? { |path| path.start_with?("docs/") || path == "README.md" || path == "RELEASING.md" }
              notes << "사용자와 유지보수자를 위한 문서를 최신 상태로 정리했습니다."
            end

            notes << "앱 안정성과 사용성을 개선했습니다." if notes.empty? && !subjects.empty?
            notes << "릴리스 패키지를 갱신했습니다." if notes.empty?
            notes.uniq
          end

          def ai_notes(subjects, paths)
            return nil if ENV.fetch("OPENAI_API_KEY", "").empty?

            begin
              prompt = {
                version: ENV.fetch("RELEASE_VERSION"),
                commit_subjects: subjects,
                changed_files: paths
              }

              uri = URI("https://api.openai.com/v1/responses")
              request = Net::HTTP::Post.new(uri)
              request["Authorization"] = "Bearer #{ENV.fetch("OPENAI_API_KEY")}"
              request["Content-Type"] = "application/json"
              request.body = {
                model: ENV.fetch("RELEASE_NOTES_MODEL", "gpt-5-mini"),
                instructions: <<~TEXT,
                  너는 macOS 앱의 릴리스 노트를 작성하는 기술 라이터다.
                  입력으로 받은 커밋 제목과 변경 파일만 근거로 사용자에게 보일 한글 변경사항 bullet을 작성하라.
                  규칙:
                  - Markdown bullet만 출력한다.
                  - 2개에서 6개 사이로 작성한다.
                  - PR 번호, 커밋 해시, 기여자 이름, 내부 브랜치 이름은 쓰지 않는다.
                  - 과장하지 말고 변경 내용이 불명확하면 보수적으로 표현한다.
                  - 다운로드 안내나 섹션 제목은 쓰지 않는다.
                TEXT
                input: JSON.pretty_generate(prompt),
                max_output_tokens: 700
              }.to_json

              response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
                http.request(request)
              end
              raise "OpenAI release notes request failed: HTTP #{response.code}" unless response.is_a?(Net::HTTPSuccess)

              data = JSON.parse(response.body)
              text = data["output_text"].to_s.strip
              if text.empty?
                text = data.fetch("output", [])
                  .flat_map { |item| item.fetch("content", []) }
                  .map { |content| content["text"].to_s }
                  .join("\n")
                  .strip
              end
              text.empty? ? nil : text.lines.map(&:strip).reject(&:empty?)
            rescue => error
              warn "OpenAI release notes generation failed: #{error.message}. Falling back to local Korean notes."
              nil
            end
          end

          pr_number = release_pr_number
          subjects, paths = release_changes(pr_number)
          bullets = ai_notes(subjects, paths) || fallback_notes(subjects, paths).map { |note| "- #{note}" }

          File.open("build/release-notes.md", "w") do |file|
            file.puts "## 변경사항"
            file.puts
            bullets.each { |line| file.puts line.start_with?("- ") ? line : "- #{line}" }
            file.puts
            file.puts "## 다운로드"
            file.puts
            file.puts "- 처음 설치하는 사용자는 `#{ENV.fetch("DMG_ASSET_NAME")}`를 다운로드하세요."
            file.puts "- 이미 설치된 앱은 Sparkle 업데이트용 `#{ENV.fetch("SPARKLE_ASSET_NAME")}`로 자동 업데이트됩니다."
          end
          RUBY

          gh release create "${{ steps.version.outputs.tag }}" \
            "build/${{ steps.dmg.outputs.asset_name }}" \
            "build/${{ steps.sparkle.outputs.asset_name }}" \
            --target "$GITHUB_SHA" \
            --title "${APP_NAME} ${{ steps.version.outputs.tag }}" \
            --notes-file build/release-notes.md

      - name: Update appcast
        if: steps.existing_tag.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_BUILD: ${{ steps.version.outputs.build }}
          RELEASE_URL: ${{ steps.sparkle.outputs.asset_url }}
          RELEASE_LENGTH: ${{ steps.sparkle.outputs.length }}
          RELEASE_ED_SIGNATURE: ${{ steps.sparkle.outputs.ed_signature }}
        run: |
          ruby <<'RUBY'
          require "rexml/document"
          require "time"

          path = "docs/appcast.xml"
          doc = REXML::Document.new(File.read(path))
          channel = REXML::XPath.first(doc, "/rss/channel")
          raise "Missing appcast channel" unless channel

          channel.get_elements("item").each do |existing|
            version = existing.elements["sparkle:shortVersionString"]&.text
            channel.delete_element(existing) if version == ENV.fetch("RELEASE_VERSION")
          end

          item = REXML::Element.new("item")
          title = item.add_element("title")
          title.text = "Version #{ENV.fetch("RELEASE_VERSION")}"

          pub_date = item.add_element("pubDate")
          pub_date.text = Time.now.utc.rfc2822

          release_notes = item.add_element("sparkle:releaseNotesLink")
          release_notes.text = "https://github.com/#{ENV.fetch("GITHUB_REPOSITORY")}/releases/tag/#{ENV.fetch("RELEASE_TAG")}"

          build = item.add_element("sparkle:version")
          build.text = ENV.fetch("RELEASE_BUILD")

          short_version = item.add_element("sparkle:shortVersionString")
          short_version.text = ENV.fetch("RELEASE_VERSION")

          enclosure = item.add_element("enclosure")
          enclosure.add_attribute("url", ENV.fetch("RELEASE_URL"))
          enclosure.add_attribute("length", ENV.fetch("RELEASE_LENGTH"))
          enclosure.add_attribute("type", "application/octet-stream")
          enclosure.add_attribute("sparkle:edSignature", ENV.fetch("RELEASE_ED_SIGNATURE"))

          channel.add_element(item)

          formatter = REXML::Formatters::Pretty.new(2)
          formatter.compact = true
          File.open(path, "w") do |file|
            file.write(%(<?xml version="1.0" encoding="utf-8"?>\n))
            formatter.write(doc.root, file)
            file.write("\n")
          end
          RUBY

      - name: Validate appcast
        if: steps.existing_tag.outputs.exists == 'false'
        run: |
          xmllint --noout docs/appcast.xml

      - name: Configure GitHub Pages
        if: steps.existing_tag.outputs.exists == 'false'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: steps.existing_tag.outputs.exists == 'false'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy appcast to GitHub Pages
        if: steps.existing_tag.outputs.exists == 'false'
        uses: actions/deploy-pages@v4
