name: Geeksfield
options:
  bundleIdPrefix: com.geeksfield
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES

targets:
  Geeksfield:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Geeksfield
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Geeksfield/Resources
    info:
      path: Geeksfield/Info.plist
      properties:
        CFBundleDisplayName: Geeksfield
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: Copyright © 2026 Geeksfield contributors. MIT License.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: Geeksfield/Geeksfield.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.geeksfield.app
        PRODUCT_NAME: Geeksfield
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
